name: Auto-Merge Automated PRs

on:
  workflow_run:
    workflows: [Validate, CodeQL]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: auto-merge-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

jobs:
  auto-merge:
    name: Auto-Merge
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success'
      && github.event.workflow_run.event == 'pull_request'
    steps:
      - name: Get PR and verify automated
        id: pr
        env:
          GH_TOKEN: ${{ secrets.CI_PAT }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          case "$HEAD_BRANCH" in
            dependabot/*|auto/*)
              echo "✅ Automated branch: $HEAD_BRANCH" ;;
            *)
              echo "Not automated — skipping"
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0 ;;
          esac

          PR_NUMBER='${{ github.event.workflow_run.pull_requests[0].number }}'
          if [[ -z "$PR_NUMBER" || "$PR_NUMBER" == "null" ]]; then
            PR_NUMBER=$(gh pr list --repo "${{ github.repository }}" \
              --head "$HEAD_BRANCH" --state open --json number --jq '.[0].number')
          fi
          if [[ -z "$PR_NUMBER" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          STATE=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json state -q .state)
          if [[ "$STATE" != "OPEN" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Verify ALL checks passed
        id: checks
        if: steps.pr.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.CI_PAT }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          CHECKS=$(gh api "repos/${{ github.repository }}/commits/$HEAD_SHA/check-runs" \
            --paginate --jq '.check_runs[] | {name: .name, status: .status, conclusion: .conclusion}')
          echo "$CHECKS" | jq -r '"  \(.name): \(.status)/\(.conclusion)"'

          FILTERED=$(echo "$CHECKS" | jq -s '[.[] | select(.name != "Auto-Merge")]')

          INCOMPLETE=$(echo "$FILTERED" | jq '[.[] | select(.status != "completed")] | length')
          if [[ "$INCOMPLETE" -gt 0 ]]; then
            echo "::notice::$INCOMPLETE check(s) still running — will re-trigger when they complete"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          FAILED=$(echo "$FILTERED" | jq '[.[] | select(
            .conclusion != "success" and .conclusion != "neutral" and .conclusion != "skipped"
          )] | length')
          if [[ "$FAILED" -gt 0 ]]; then
            echo "::error::$FAILED check(s) failed"
            exit 1
          fi
          echo "✅ All checks passed"

      - name: Check Copilot review
        id: copilot
        if: steps.pr.outputs.skip != 'true' && steps.checks.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.CI_PAT }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          COMMENTS=$(gh api "repos/${{ github.repository }}/pulls/$PR_NUMBER/comments" \
            --jq '[.[] | select(.user.login == "copilot-pull-request-reviewer[bot]")] | length')
          echo "count=$COMMENTS" >> "$GITHUB_OUTPUT"
          [ "$COMMENTS" -gt 0 ] && echo "🔍 Copilot: $COMMENTS concern(s)" || echo "✅ Copilot clean"

      - name: Approve and merge
        if: >-
          steps.pr.outputs.skip != 'true'
          && steps.checks.outputs.skip != 'true'
          && steps.copilot.outputs.count == '0'
        env:
          GH_TOKEN: ${{ secrets.CI_PAT }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          gh pr review "$PR_NUMBER" --repo "${{ github.repository }}" --approve || true
          gh pr merge "$PR_NUMBER" --repo "${{ github.repository }}" --rebase --delete-branch
          echo "✅ PR #$PR_NUMBER merged"

      - name: Flag for human review
        if: >-
          steps.pr.outputs.skip != 'true'
          && steps.checks.outputs.skip != 'true'
          && steps.copilot.outputs.count != '0'
        env:
          GH_TOKEN: ${{ secrets.CI_PAT }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          gh pr edit "$PR_NUMBER" --repo "${{ github.repository }}" --add-assignee teh-hippo
          gh pr comment "$PR_NUMBER" --repo "${{ github.repository }}" --body \
            "⚠️ Copilot flagged concerns. Assigned for human review."
