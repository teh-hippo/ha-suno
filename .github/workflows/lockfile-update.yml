name: Lockfile Update

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: Update Lockfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.CI_PAT }}

      - uses: astral-sh/setup-uv@v7

      - name: Update lockfile
        id: update
        run: |
          uv lock --upgrade 2>&1 | tee /tmp/uv-output.txt
          if git diff --quiet uv.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.update.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.CI_PAT }}
          commit-message: "chore(deps): weekly lockfile update"
          title: "chore(deps): weekly lockfile update"
          body-path: /tmp/uv-output.txt
          branch: auto/lockfile-update
          base: master
          labels: dependencies
          delete-branch: true
          add-paths: uv.lock
