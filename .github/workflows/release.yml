name: Release

on:
  workflow_run:
    workflows: [Validate]
    types: [completed]
    branches: [master]

concurrency:
  group: release
  cancel-in-progress: true

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Python Semantic Release
        id: semantic_release
        uses: python-semantic-release/python-semantic-release@350c48fcb3ffcdfd2e0a235206bc2ecea6b69df0 # v10
        with:
          github_token: ${{ secrets.RELEASE_TOKEN }}

      - name: Create/Update latest GitHub Release
        if: ${{ steps.semantic_release.outputs.released == 'true' && steps.semantic_release.outputs.is_prerelease == 'false' }}
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          tag_name: latest
          name: latest
          target_commitish: ${{ github.sha }}
          generate_release_notes: false
          prerelease: false
          overwrite_files: true
          body: |
            Alias release for tooling that resolves by `latest`.
            Current stable tag: ${{ steps.semantic_release.outputs.tag }}
